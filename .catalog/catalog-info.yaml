apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: tektoncd-tools-helm
  title: Tektoncd Tools - Helm
  description: Helm 是 Kubernetes 应用包管理工具。Alauda fork 在上游基础上集成了私有 chart 仓库支持，在 Tekton 任务镜像中作为 Helm 部署任务的核心依赖。
  tags:
    - tool
    - kubernetes
    - helm
    - open-source-fork
  links:
    - url: https://github.com/AlaudaDevops/helm
      title: GitHub Repository
      icon: github
    - url: https://build-sonar.alauda.cn/dashboard?id=github.com-AlaudaDevops-helm
      title: SonarQube
      icon: dashboard
    - url: https://github.com/helm/helm
      title: Upstream Repository
      icon: github
  annotations:
    # github plugin
    github.com/project-slug: AlaudaDevops/helm
    # sonarqube plugin
    sonarqube.org/project-key: github.com-AlaudaDevops-helm
    # 开源组件代码仓库地址，格式：${url}/${project}/${repo}
    acp.cpaas.io/open-source-component-repo: https://github.com/helm/helm
    # 开源组件的版本信息，只适用于开源组件，自研组件默认不收集版本信息,格式 ${version}
    acp.cpaas.io/open-source-component-version: v3.18.7
    # 开源组件的license信息,格式 ${license}
    acp.cpaas.io/open-source-component-license: Apache
    # 开源组件的license地址,格式 ${url}/${project}/${repo}/${license-path}
    acp.cpaas.io/open-source-component-license_url: https://github.com/helm/helm/blob/main/LICENSE
    # backstage techdocs plugin
    backstage.io/techdocs-ref: dir:../
    acp.cpaas.io/owner: qingliu@alauda.io

    # 组件属性，区别是否部署时必带的核心组件,可选值为 core 和 plugin。
    acp.cpaas.io/functional-attributes: plugin

spec:
  type: service
  system: system:alauda-devops-system
  lifecycle: production
  owner: devops
